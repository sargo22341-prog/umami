<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/umami.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/umami.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Umami" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Umami</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <!-- Variables d'environnement runtime (Docker) generees par docker-entrypoint.sh -->
    <!-- En dev sans Docker, ce fichier n'existe pas et window.__ENV__ reste undefined -->
    <script src="/env-config.js" onerror="console.debug('env-config.js not found, using build-time env vars')"></script>
    <!-- Anti-FOUC : appliquer la classe dark avant le rendu React -->
    <script>
      ;(function () {
        try {
          var stored = localStorage.getItem('umami-theme')
          if (stored === 'dark') {
            document.documentElement.classList.add('dark')
          } else if (stored === 'light') {
            document.documentElement.classList.remove('dark')
          } else {
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
              document.documentElement.classList.add('dark')
            }
          }
        } catch {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
