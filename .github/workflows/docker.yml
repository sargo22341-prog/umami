name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "server/**"
      - "public/**"
      - "index.html"
      - "vite.config.*"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "nginx.conf"
      - "docker-entrypoint.sh"
      - "docker-compose.example.yml"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set lowercase image names
        run: |
          echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "PROXY_IMAGE_NAME=$(echo '${{ github.repository }}-recipes-search-proxy' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Read package version
        id: version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: runner
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Build and push recipes search proxy Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: recipes-search-proxy
          tags: |
            ghcr.io/${{ env.PROXY_IMAGE_NAME }}:latest
            ghcr.io/${{ env.PROXY_IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ env.RELEASE_SHA }}
          body_path: RELEASE_NOTES.md
