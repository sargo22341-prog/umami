server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100m;

    # Proxy recipe-source search before the generic /api rule.
    location ^~ /api/recipes-search/ {
        proxy_pass http://recipes-search-proxy:3001/api/recipes-search/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location ^~ /api/recipes-asset {
        proxy_pass http://recipes-search-proxy:3001/api/recipes-asset;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Proxy /api to Mealie.
    location ^~ /api/ {
        resolver 127.0.0.11 valid=10s;
        set $mealie_url "${VITE_MEALIE_URL}";
        proxy_pass $mealie_url;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location ~* ^/(?:.+/)?assets/(.+)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files /assets/$1 =404;
    }

    location ~* ^/(?:.+/)?(manifest\.webmanifest|umami\.png|logo_umami\.png)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files /$1 =404;
    }

    location ~* ^/(?:.+/)?env-config\.js$ {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /env-config.js =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
